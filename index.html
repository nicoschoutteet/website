<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>D3 Bar Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <h1>This is a simple bar chart example</h1>
    <p>It was generated with Claude AI.</p>
    <p>It shows the age of everyone in our family.</p>
    <svg id="chart" width="500" height="300"></svg>

    <script>
      const data = [
        { name: "Nico", value: 36 },
        { name: "Beatrijs", value: 36 },
        { name: "Florian", value: 6 },
        { name: "Esmée", value: 3 },
      ];

      const width = 500;
      const height = 300;
      const margin = { top: 20, right: 20, bottom: 30, left: 40 };

      const svg = d3.select("#chart");

      const x = d3
        .scaleBand()
        .domain(data.map((d) => d.name))
        .range([margin.left, width - margin.right])
        .padding(0.2);

      const y = d3
        .scaleLinear()
        .domain([0, d3.max(data, (d) => d.value)])
        .nice()
        .range([height - margin.bottom, margin.top]);

      // Bars
      svg
        .selectAll("rect")
        .data(data)
        .join("rect")
        .attr("x", (d) => x(d.name))
        .attr("y", (d) => y(d.value))
        .attr("height", (d) => y(0) - y(d.value))
        .attr("width", x.bandwidth())
        .attr("fill", "steelblue");

      // X axis
      svg
        .append("g")
        .attr("transform", `translate(0,${height - margin.bottom})`)
        .call(d3.axisBottom(x));

      // Y axis
      svg
        .append("g")
        .attr("transform", `translate(${margin.left},0)`)
        .call(
          d3
            .axisLeft(y)
            .tickValues(d3.range(0, d3.max(data, (d) => d.value) + 1, 2)),
        );
    </script>
  </body>
</html>
